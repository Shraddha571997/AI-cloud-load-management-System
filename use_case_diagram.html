<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Use Case Diagram – AI-Based Predictive Cloud Load Management System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
  * { box-sizing: border-box; }
  body {
    font-family: 'Roboto', sans-serif;
    display: flex;
    justify-content: center;
    background: #f4f6f8;
    padding: 30px;
    margin: 0;
  }
  .container {
    background: white;
    padding: 30px 40px;
    border: 2px solid #333;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  }
  h1 {
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    margin-top: 0;
    margin-bottom: 30px;
    color: #111;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 2px solid #333;
    padding-bottom: 12px;
  }
  svg {
    display: block;
    margin: 0 auto;
    shape-rendering: geometricPrecision;
  }
  text {
    font-family: 'Roboto', sans-serif;
  }
  @media print {
    body { padding: 0; background: white; }
    .container { border: none; box-shadow: none; padding: 0; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Use Case Diagram – AI-Based Predictive Cloud Load Management System</h1>
  <svg width="840" height="900" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Arrowhead for association lines -->
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1 L 9 5 L 0 9 z" fill="#111" />
      </marker>
      <!-- Actor Stick Figure Definition -->
      <g id="actor">
          <circle cx="0" cy="-25" r="14" fill="white" stroke="#111" stroke-width="2.5"/>
          <line x1="0" y1="-11" x2="0" y2="30" stroke="#111" stroke-width="2.5"/>
          <line x1="-22" y1="-2" x2="22" y2="-2" stroke="#111" stroke-width="2.5"/>
          <line x1="0" y1="30" x2="-18" y2="65" stroke="#111" stroke-width="2.5"/>
          <line x1="0" y1="30" x2="18" y2="65" stroke="#111" stroke-width="2.5"/>
      </g>
    </defs>

    <!-- System Boundary -->
    <rect x="230" y="20" width="380" height="850" fill="#fafafa" stroke="#333" stroke-width="2" stroke-dasharray="8,5" rx="4" />
    <text x="420" y="50" text-anchor="middle" font-weight="700" font-size="14" fill="#333" letter-spacing="0.2px">AI-Based Predictive Cloud Load Management System</text>
    
    <!-- Lines from User -->
    <line x1="130" y1="450" x2="280" y2="110" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)" />
    <line x1="130" y1="450" x2="280" y2="180" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)" />
    <line x1="130" y1="450" x2="280" y2="250" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)" />
    <line x1="130" y1="450" x2="280" y2="320" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)" />
    <line x1="130" y1="450" x2="280" y2="390" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)" />
    <line x1="130" y1="450" x2="280" y2="460" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)" />
    <line x1="130" y1="450" x2="280" y2="530" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)" />
    <line x1="130" y1="450" x2="280" y2="600" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)" />

    <!-- Lines from Admin -->
    <line x1="710" y1="450" x2="560" y2="110" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)" />
    <line x1="710" y1="450" x2="560" y2="180" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)" />
    <line x1="710" y1="450" x2="560" y2="670" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)" />
    <line x1="710" y1="450" x2="560" y2="740" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)" />
    <line x1="710" y1="450" x2="560" y2="810" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)" />

    <!-- Use Cases -->
    <!-- Common Use Cases -->
    <ellipse cx="420" cy="110" rx="140" ry="26" fill="#ffffff" stroke="#111" stroke-width="2" />
    <text x="420" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Register / Login</text>

    <ellipse cx="420" cy="180" rx="140" ry="26" fill="#ffffff" stroke="#111" stroke-width="2" />
    <text x="420" y="185" text-anchor="middle" font-size="14" font-weight="600" fill="#111">View Dashboard</text>

    <!-- User Specific Use Cases -->
    <ellipse cx="420" cy="250" rx="140" ry="26" fill="#ffffff" stroke="#111" stroke-width="2" />
    <text x="420" y="255" text-anchor="middle" font-size="14" font-weight="500" fill="#111">Manage Profile</text>

    <ellipse cx="420" cy="320" rx="140" ry="26" fill="#ffffff" stroke="#111" stroke-width="2" />
    <text x="420" y="325" text-anchor="middle" font-size="14" font-weight="500" fill="#111">Predict Load</text>

    <ellipse cx="420" cy="390" rx="140" ry="26" fill="#ffffff" stroke="#111" stroke-width="2" />
    <text x="420" y="395" text-anchor="middle" font-size="14" font-weight="500" fill="#111">View Prediction Results</text>

    <ellipse cx="420" cy="460" rx="140" ry="26" fill="#ffffff" stroke="#111" stroke-width="2" />
    <text x="420" y="465" text-anchor="middle" font-size="14" font-weight="500" fill="#111">Export Reports</text>

    <ellipse cx="420" cy="530" rx="140" ry="26" fill="#ffffff" stroke="#111" stroke-width="2" />
    <text x="420" y="535" text-anchor="middle" font-size="14" font-weight="500" fill="#111">Configure Autopilot</text>

    <ellipse cx="420" cy="600" rx="140" ry="26" fill="#ffffff" stroke="#111" stroke-width="2" />
    <text x="420" y="605" text-anchor="middle" font-size="14" font-weight="500" fill="#111">Receive Alerts</text>

    <!-- Admin Specific Use Cases -->
    <ellipse cx="420" cy="670" rx="140" ry="26" fill="#ffffff" stroke="#111" stroke-width="2" />
    <text x="420" y="675" text-anchor="middle" font-size="14" font-weight="500" fill="#111">Manage Users</text>

    <ellipse cx="420" cy="740" rx="140" ry="26" fill="#ffffff" stroke="#111" stroke-width="2" />
    <text x="420" y="745" text-anchor="middle" font-size="14" font-weight="500" fill="#111">Retrain ML Model</text>

    <ellipse cx="420" cy="810" rx="140" ry="26" fill="#ffffff" stroke="#111" stroke-width="2" />
    <text x="420" y="815" text-anchor="middle" font-size="14" font-weight="500" fill="#111">View System Logs</text>

    <!-- Actors -->
    <!-- User -->
    <use href="#actor" x="100" y="450" />
    <text x="100" y="535" text-anchor="middle" font-weight="700" font-size="16" fill="#111">User</text>

    <!-- Admin -->
    <use href="#actor" x="740" y="450" />
    <text x="740" y="535" text-anchor="middle" font-weight="700" font-size="16" fill="#111">Admin</text>

  </svg>
</div>
</body>
</html>
